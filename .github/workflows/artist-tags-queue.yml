name: Artist Tags Queue

on:
  workflow_dispatch:
  push:
    paths:
      - 'tagging/input/new-artists.queue.json'
      - 'tagging/scripts/tags/**'
      - 'tagging/data/platform-source/qq/v8/dictionaries/standard-style-taxonomy.json'

permissions:
  contents: write

jobs:
  process-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process queue
        run: node tagging/scripts/tags/process-new-artists-queue.mjs

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artist-tags-run-artifacts
          path: tagging/work/auto/**
          if-no-files-found: ignore

      - name: Commit updated tag tables
        run: |
          if git diff --quiet -- tagging/data/tags; then
            echo "No tag table changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tagging/data/tags
          git commit -m "Auto-update artist tag tables from queue"
          git push
